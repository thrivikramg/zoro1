{% extends 'base.html' %}

{% block content %}
<section class="result-section">
    <h1>Analysis Results</h1>
    <div class="results-container">

        <div class="images-grid">
            <div class="image-card">
                <h3>Original Image</h3>
                <img src="{{ url_for('static', filename='uploads/' + original_image) }}" alt="Original Sample">
            </div>
            <div class="image-card">
                <h3>AI Detection</h3>
                <img src="{{ url_for('static', filename='annotated/' + annotated_image) }}" alt="Analyzed Sample">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-viruses"></i>
                <div class="stat-info">
                    <h4>Particles Detected</h4>
                    <span class="stat-value">{{ count }}</span>
                </div>
            </div>
            <div class="stat-card {{ status_class }}">
                <i class="fa-solid fa-droplet"></i>
                <div class="stat-info">
                    <h4>Contamination Level</h4>
                    <span class="stat-value">{{ level }}</span>
                </div>
            </div>
        </div>

        <div class="actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">Analyze Another Sample</a>
        </div>

    </div>
</section>

<style>
    /* Inline styles for result specific layout */
    .result-section {
        width: 100%;
        max-width: 1000px;
        padding: 30px;
        backdrop-filter: blur(10px);
    }

    .images-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
    }

    @media (max-width: 768px) {
        .images-grid {
            grid-template-columns: 1fr;
        }
    }

    .image-card {
        background: var(--card-bg);
        padding: 15px;
        border-radius: 12px;
    }

    .image-card h3 {
        margin-bottom: 10px;
        color: var(--text-muted);
        font-size: 1rem;
    }

    .image-card img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid var(--border-color);
    }

    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 20px;
        border: 1px solid var(--border-color);
    }

    .stat-card i {
        font-size: 2rem;
        color: var(--primary-color);
        background: rgba(59, 130, 246, 0.1);
        padding: 15px;
        border-radius: 12px;
    }

    .stat-info {
        text-align: left;
    }

    .stat-info h4 {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 5px;
    }

    .stat-value {
        font-size: 1.5rem;
        font-weight: 700;
    }

    .stat-card.success .stat-value {
        color: var(--success-color);
    }

    .stat-card.success i {
        color: var(--success-color);
        background: rgba(16, 185, 129, 0.1);
    }

    .stat-card.warning .stat-value {
        color: #f59e0b;
    }

    .stat-card.warning i {
        color: #f59e0b;
        background: rgba(245, 158, 11, 0.1);
    }

    .stat-card.danger .stat-value {
        color: var(--danger-color);
    }

    .stat-card.danger i {
        color: var(--danger-color);
        background: rgba(239, 68, 68, 0.1);
    }
</style>
{% endblock %}
