{% extends 'base.html' %}

{% block content %}
<section class="hero-section">
    <h1>Detect Microplastics with AI</h1>
    <p class="subtitle">Upload your water sample image for instant analysis and contamination grading.</p>
</section>

<section class="upload-section">
    <div class="upload-container" id="upload-area">
        <form action="{{ url_for('analyze') }}" method="POST" enctype="multipart/form-data" id="upload-form">
            <input type="file" name="file" id="file-input" accept="image/*" hidden>
            <div class="upload-content">
                <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                <h3>Drag & Drop or Click to Upload</h3>
                <p>Supports JPG, PNG, TIFF (Max 16MB)</p>
            </div>
        </form>
    </div>
    <div id="preview-container" class="hidden">
        <img id="image-preview" src="" alt="Preview">
        <div class="preview-actions">
            <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
            <button type="button" id="analyze-btn" class="btn btn-primary">Analyze Sample</button>
        </div>
        <div id="loading-spinner" class="hidden">
            <div class="spinner"></div>
            <p>Processing image...</p>
        </div>
    </div>
</section>
{% endblock %}
